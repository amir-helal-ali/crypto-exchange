# ===========================================
# Local Development - No Nginx, Direct Access
# ===========================================
# Usage: docker compose -f docker-compose.dev.yml up -d --build
#
# Access:
#   Frontend:  http://localhost:${FRONTEND_HOST_PORT:-3001}
#   Admin:     http://localhost:${ADMIN_HOST_PORT:-3002}
#   Backend:   http://localhost:${BACKEND_HOST_PORT:-3000}
#   PostgreSQL: localhost:5432
#   Redis:     localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-exchange-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-egmoney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-EgMoney@2024Secure!}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_exchange}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-egmoney} -d ${POSTGRES_DB:-crypto_exchange}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: crypto-exchange-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-exchange-api
    restart: always
    ports:
      - "${BACKEND_HOST_PORT:-3000}:${BACKEND_INTERNAL_PORT:-3000}"
    environment:
      DATABASE_URL: ${DATABASE_URL:-host=postgres user=egmoney password=EgMoney@2024Secure! dbname=crypto_exchange port=5432 sslmode=disable}
      PORT: ${BACKEND_INTERNAL_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - set it in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${FRONTEND_HOST_PORT:-3001}}
      GIN_MODE: debug
      # Port settings
      BACKEND_HOST_PORT: ${BACKEND_HOST_PORT:-3000}
      FRONTEND_HOST_PORT: ${FRONTEND_HOST_PORT:-3001}
      ADMIN_HOST_PORT: ${ADMIN_HOST_PORT:-3002}
      BACKEND_INTERNAL_PORT: ${BACKEND_INTERNAL_PORT:-3000}
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT:-3000}
      ADMIN_INTERNAL_PORT: ${ADMIN_INTERNAL_PORT:-3000}
      NGINX_HTTP_PORT: ${NGINX_HTTP_PORT:-80}
      NGINX_HTTPS_PORT: ${NGINX_HTTPS_PORT:-443}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-EgMoney}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@eg-money.com}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/root/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${BACKEND_INTERNAL_PORT:-3000}/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_HOST_PORT:-3000}}
    container_name: crypto-exchange-web
    restart: always
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:${FRONTEND_INTERNAL_PORT:-3000}"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_HOST_PORT:-3000}}
      PORT: ${FRONTEND_INTERNAL_PORT:-3000}
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://localhost:${FRONTEND_INTERNAL_PORT:-3000}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_HOST_PORT:-3000}}
    container_name: crypto-exchange-admin
    restart: always
    ports:
      - "${ADMIN_HOST_PORT:-3002}:${ADMIN_INTERNAL_PORT:-3000}"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_HOST_PORT:-3000}}
      PORT: ${ADMIN_INTERNAL_PORT:-3000}
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://localhost:${ADMIN_INTERNAL_PORT:-3000}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  uploads:
