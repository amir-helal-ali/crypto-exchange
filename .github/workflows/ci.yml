name: EgMoney CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  # ============================================================
  # Backend: Build, Vet, Test
  # ============================================================
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: egmoney_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: crypto_exchange_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Go vet
        run: go vet ./...

      - name: Go fmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "❌ Code is not formatted. Run: gofmt -w ."
            gofmt -d .
            exit 1
          fi

      - name: Run unit tests
        env:
          DATABASE_URL: "host=127.0.0.1 user=egmoney_test password=test_password dbname=crypto_exchange_test port=5432 sslmode=disable"
          JWT_SECRET: "test-jwt-secret-for-ci-minimum-32-characters"
          ADMIN_PASSWORD: "TestAdmin@123456"
          REDIS_URL: "redis://127.0.0.1:6379/0"
        run: go test -v -race -timeout 60s ./...

      - name: Build binary
        env:
          JWT_SECRET: "test-jwt-secret-for-ci-minimum-32-characters"
        run: go build -o egmoney-backend .

  # ============================================================
  # Frontend: Install, Lint, Build
  # ============================================================
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint --dir src || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3000"

  # ============================================================
  # Admin: Install, Lint, Build
  # ============================================================
  admin:
    name: Admin Panel (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3000"

  # ============================================================
  # Docker Build (only on push to master/main)
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, admin]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: egmoney-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: egmoney-frontend:${{ github.sha }}
          build-args: NEXT_PUBLIC_API_URL=http://localhost:3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin Image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: false
          tags: egmoney-admin:${{ github.sha }}
          build-args: NEXT_PUBLIC_API_URL=http://localhost:3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Security Audit
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend npm audit
        run: cd frontend && npm audit --audit-level=high || true

      - name: Admin npm audit
        run: cd admin && npm audit --audit-level=high || true
