name: EgMoney CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  # ===========================================
  # Backend: Go lint, vet, test, build
  # ===========================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: egmoney_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: crypto_exchange_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check formatting (gofmt)
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "❌ The following files are not formatted:"
            echo "$output"
            echo "Run: gofmt -w ."
            exit 1
          fi
          echo "✅ All files are properly formatted"

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        env:
          JWT_SECRET: test-jwt-secret-for-ci-only
          DATABASE_URL: host=localhost user=egmoney_test password=test_password dbname=crypto_exchange_test port=5432 sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: go test -v -race -timeout 60s ./...

      - name: Build backend
        env:
          JWT_SECRET: test-jwt-secret-for-ci-only
        run: go build -o /dev/null ./...

  # ===========================================
  # Frontend: Next.js lint & build
  # ===========================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ===========================================
  # Admin Panel: Next.js lint & build
  # ===========================================
  admin:
    name: Admin Panel CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ===========================================
  # Docker: Build images (master only)
  # ===========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, admin]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: egmoney-backend:${{ github.sha }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NEXT_PUBLIC_API_URL=http://localhost:3000
          tags: egmoney-frontend:${{ github.sha }}

      - name: Build admin image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NEXT_PUBLIC_API_URL=http://localhost:3000
          tags: egmoney-admin:${{ github.sha }}
