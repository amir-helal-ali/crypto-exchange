services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-exchange-db
    restart: always
    environment:
      POSTGRES_USER: egmoney
      POSTGRES_PASSWORD: EgMoney@2024Secure!
      POSTGRES_DB: crypto_exchange
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egmoney -d crypto_exchange"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-exchange-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "host=postgres user=egmoney password=EgMoney@2024Secure! dbname=crypto_exchange port=5432 sslmode=disable"
      PORT: "3000"
      JWT_SECRET: "${JWT_SECRET:-eg-money-super-secret-jwt-key-2024}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/root/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.eg-money.local"
    container_name: crypto-exchange-web
    restart: always
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://api.eg-money.local"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.eg-money.local"
    container_name: crypto-exchange-admin
    restart: always
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://api.eg-money.local"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--timeout=5", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: crypto-exchange-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  uploads:
