version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-exchange-db
    restart: always
    environment:
      POSTGRES_USER: egmoney
      POSTGRES_PASSWORD: EgMoney@2024Secure!
      POSTGRES_DB: crypto_exchange
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-exchange-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "host=postgres user=egmoney password=EgMoney@2024Secure! dbname=crypto_exchange port=5432 sslmode=disable"
      PORT: "3000"
    depends_on:
      - postgres
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-exchange-web
    restart: always
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://api.eg-money.com"
    networks:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: crypto-exchange-admin
    restart: always
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://api.eg-money.com"
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: crypto-exchange-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - admin
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
