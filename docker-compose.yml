services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-exchange-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-egmoney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-EgMoney@2024Secure!}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_exchange}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-egmoney} -d ${POSTGRES_DB:-crypto_exchange}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: crypto-exchange-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-exchange-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-host=postgres user=egmoney password=EgMoney@2024Secure! dbname=crypto_exchange port=5432 sslmode=disable}
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - set it in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      FRONTEND_URL: ${FRONTEND_URL:-https://eg-money.local}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-EgMoney}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@eg-money.com}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Path to the shared trigger file — when backend writes to this file,
      # the nginx sidecar regenerates the config and reloads.
      NGINX_RELOAD_TRIGGER: /shared/nginx/.reload-trigger
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/root/uploads
      - nginx-shared:/shared/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--method=GET", "http://localhost:3000/api/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: crypto-exchange-web
    restart: always
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      ORIGIN: ${ORIGIN:-http://localhost:3001}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: crypto-exchange-admin
    restart: always
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: crypto-exchange-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - nginx-shared:/shared/nginx
    environment:
      BACKEND_URL: http://backend:3000
      NGINX_RELOAD_TRIGGER: /shared/nginx/.reload-trigger
      NGINX_WATCH_INTERVAL: "2"
      # Fallback values used if backend is unreachable on startup
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-eg-money.local}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-api.eg-money.local}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.eg-money.local}
      MAIN_DOMAIN: ${MAIN_DOMAIN:-eg-money.local}
      SSL_ENABLED: ${SSL_ENABLED:-true}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  uploads:
  nginx-shared:
